<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Beatify — Offline</title>
    <!-- #1761: fully self-contained (inline styles, no network deps) so it
         renders when the network is down and no other asset is cached. -->
    <style>
        :root { color-scheme: dark; }
        * { box-sizing: border-box; }
        html, body { height: 100%; margin: 0; }
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            padding: 2rem;
            text-align: center;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: #f2f2f7;
            background: radial-gradient(circle at 50% 30%, #241a3a 0%, #0e0b18 70%);
        }
        .offline-emoji { font-size: 3.5rem; line-height: 1; }
        h1 { margin: 0; font-size: 1.6rem; font-weight: 700; }
        p { margin: 0; max-width: 22rem; color: rgba(242, 242, 247, 0.7); line-height: 1.5; }
        button {
            margin-top: 0.5rem;
            padding: 0.85rem 2rem;
            min-height: 44px;
            font-size: 1rem;
            font-weight: 600;
            color: #0e0b18;
            background: #b072ff;
            border: none;
            border-radius: 999px;
            cursor: pointer;
        }
        button:active { transform: scale(0.97); }
    </style>
</head>
<body>
    <div class="offline-emoji" aria-hidden="true">🎵📴</div>
    <h1>You're offline</h1>
    <p>Beatify can't reach the server right now. Check your Wi-Fi or connection and try again.</p>
    <button type="button" onclick="location.reload()">Retry</button>
</body>
</html>
