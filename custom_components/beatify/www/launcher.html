<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="launcher.title">Beatify</title>
    <style>
        :root {
            --color-bg-primary: #0a0a12;
            --color-accent-primary: #ff2d6a;
            --color-accent-secondary: #00f5ff;
            --color-text-primary: #ffffff;
            --color-text-muted: #8b8b9e;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: var(--color-bg-primary);
            color: var(--color-text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 24px;
        }

        .logo {
            font-size: 48px;
            font-weight: 700;
            margin-bottom: 16px;
        }

        .logo .beat {
            color: var(--color-text-primary);
        }

        .logo .ify {
            background: linear-gradient(135deg, var(--color-accent-primary), var(--color-accent-secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .message {
            font-size: 18px;
            color: var(--color-text-muted);
            margin-bottom: 32px;
            line-height: 1.5;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 18px 40px;
            background: linear-gradient(135deg, var(--color-accent-primary), #ff6b9d);
            color: white;
            text-decoration: none;
            border-radius: 14px;
            font-size: 18px;
            font-weight: 600;
            transition: transform 0.15s ease, box-shadow 0.15s ease;
            cursor: pointer;
            border: none;
            letter-spacing: 0.02em;
        }

        .btn:hover {
            transform: scale(1.03);
            box-shadow: 0 0 30px rgba(255, 45, 106, 0.4);
        }

        .btn:active {
            transform: scale(0.97);
        }

        .btn-icon {
            font-size: 22px;
        }

        .hint {
            margin-top: 24px;
            font-size: 14px;
            color: var(--color-text-muted);
            min-height: 20px;
        }

        .status {
            margin-top: 12px;
            font-size: 13px;
            color: var(--color-text-muted);
            opacity: 0.6;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .opening {
            animation: pulse 1.5s ease-in-out infinite;
        }
    </style>
</head>
<body>
    <div class="logo">
        <span class="beat">Beat</span><span class="ify">ify</span>
    </div>
    <p class="message" id="message" data-i18n="launcher.clickToLaunch">Launch the game in fullscreen — no distractions.</p>
    <a class="btn" id="openBtn" target="_blank" rel="noopener" href="#">
        <span class="btn-icon">🎵</span>
        <span data-i18n="launcher.openBeatify">Open Beatify</span>
    </a>
    <p class="hint" id="hint"></p>
    <p class="status" id="status"></p>

    <script src="/beatify/static/js/i18n.js?v={{ASSET_VER}}"></script>
    <script>
        // rc17 (#1096): the launcher is an `<a target="_blank">` link
        // instead of a script-driven `window.open`. Reason:
        //
        //   - HA Companion App on iOS intercepts `/auth/authorize`
        //     navigations inside its own WKWebView and runs its native
        //     auto-login flow, which uses a hardcoded client_id /
        //     redirect_uri pair that doesn't match Beatify's. Result:
        //     "Invalid redirect URI" 403 from HA's IndieAuth.
        //   - `target="_blank"` from a Companion App webview opens the
        //     URL OUTSIDE the webview (external Safari, or Safari View
        //     Controller — both fine: each has its own cookie jar and
        //     runs the OAuth flow cleanly with no Companion-side
        //     interception).
        //   - On desktop browsers iframed inside the HA panel,
        //     `target="_blank"` opens a new top-level tab outside the
        //     iframe — same effect as the old `window.open` path.
        //   - On Android Companion, `target="_blank"` opens external
        //     Chrome / Custom Tabs (or honors the user's preference).
        //
        // We lose the "focus existing tab" affordance the old window.open
        // path had — acceptable trade for unblocking iOS Companion users.
        //
        // Android HA Companion (#1114) follow-up: the Android WebView
        // swallows target="_blank" silently — no external tab opens, the
        // launcher UI just shows the "opened in new tab" toast but
        // nothing actually launched. We detect the Companion Android UA
        // and navigate `window.location` (the current iframe) to the
        // admin URL directly, bypassing HA's SPA router.
        //
        // Why not window.top? HA's SPA is registered as a panel under
        // the path prefix `/beatify/*`. Navigating the top frame to
        // `/beatify/admin` causes HA's router to intercept and re-load
        // the Beatify panel (which iframes `/beatify/launcher`), bouncing
        // the user back to this page. Navigating `window.location` (the
        // iframe itself) skips HA's router entirely — the backend serves
        // the admin HTML straight into the panel frame.
        // Trade-off: admin runs inside HA's chrome rather than fullscreen,
        // but it is fully functional.

        function isAndroidCompanion() {
            var ua = navigator.userAgent || '';
            return /Android/i.test(ua) && /Home ?Assistant/i.test(ua);
        }

        window.addEventListener('load', async function() {
            // Set the href on load so we pick up window.location.origin
            // dynamically (LAN, Nabu Casa, custom domain all just work).
            var openBtn = document.getElementById('openBtn');
            var beatifyUrl = window.location.origin + '/beatify/admin';
            if (openBtn) openBtn.href = beatifyUrl;

            if (openBtn) openBtn.addEventListener('click', function(evt) {
                // Android Companion: bypass target="_blank" entirely —
                // navigate the current iframe so Beatify actually loads.
                if (isAndroidCompanion()) {
                    evt.preventDefault();
                    window.location.href = beatifyUrl;
                    return;
                }
                // All other contexts (iOS Companion, desktop iframe,
                // standalone browser): let target="_blank" do its job
                // and decorate the launcher to say "opened in a new tab".
                var msg = document.getElementById('message');
                if (msg) {
                    msg.textContent =
                        (window.BeatifyI18n && BeatifyI18n.t('launcher.openedInNewTab')) ||
                        'Beatify is running in a new tab! 🎶';
                }
            });

            if (window.BeatifyI18n) {
                await BeatifyI18n.init();
                BeatifyI18n.initPageTranslations();
            }
        });
    </script>
</body>
</html>
